name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Pull latest code
      uses: actions/checkout@v4
      with:
        clean: false

    - name: Rebuild and restart
      run: |
        docker compose down
        docker compose build --no-cache
        docker compose up -d
        docker system prune -f
