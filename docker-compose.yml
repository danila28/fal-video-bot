# atlas-video-bot — runs alongside video-gen-bot and shares its PostgreSQL.
#
# Before `docker compose up`:
#   1. Make sure video-gen-bot postgres is already running (it owns the DB).
#   2. Find the external network name of video-gen-bot:
#        docker network ls | grep video-gen-bot
#      It is usually `video-gen-bot_bot-network`.
#   3. If yours differs, update `networks.bot-network.name` below to match.
#
# The bot connects to host `postgres` — which resolves inside the shared
# Docker network to the postgres container managed by video-gen-bot.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-video-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ATLAS_API_KEY=${ATLAS_API_KEY}
      - CORE_DB_NAME=${CORE_DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - BLOTATO_BASE_URL=${BLOTATO_BASE_URL}
      - BLOTATO_API_KEY=${BLOTATO_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_DEFAULT_VOICE_ID=${ELEVENLABS_DEFAULT_VOICE_ID}
      - OUTRO_VIDEO_PATH=${OUTRO_VIDEO_PATH:-}
    volumes:
      - ./static:/app/static
    networks:
      - bot-network

networks:
  bot-network:
    external: true
    # Имя docker-сети, которую создаёт video-gen-bot. Если у вас другое — поправьте.
    name: video-gen-bot_bot-network
